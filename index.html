<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal War - 鐵板陣 x 兵蜂</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #09090b;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* 強制保持 9:16 的直式手機比例邊框 */
        #game-container {
            position: relative;
            width: 100vmin;
            height: 177.77vmin; /* 9:16 比例 */
            max-width: 540px;
            max-height: 960px;
            border: 2px solid #3f3f46;
            background-color: #18181b;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* 網頁版提示 */
        #hint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #71717a;
            pointer-events: none;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1080" height="1920"></canvas>
    <div id="hint">左半邊：拖曳/按住移動 | 右上半：對空砲 | 右下半：對地炸彈</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ==========================================
// 遊戲全域變數與狀態
// ==========================================
const game = {
    width: 1080,
    height: 1920,
    spawnTimer: 0,
    bullets: [],
    bombs: [],
    enemies: [],
    crystals: [],
    buildings: [
        { x: 540, y: 500, size: 120, isDestroyed: false } // 測試用隱藏建築
    ],
    score: 0,
    kills: 0
};

// ==========================================
// 物件類別定義 (Entities)
// ==========================================

// 1. 玩家戰機
class PlayerFighter {
    constructor() {
        this.x = 540;
        this.y = 1600;
        this.size = 100;
        this.drones = [];
        this.history = []; // 用於僚機跟隨
    }

    update() {
        // 紀錄位置歷史 (延遲跟隨)
        this.history.unshift({ x: this.x, y: this.y });
        if (this.history.length > 100) this.history.pop();

        // 更新僚機位置
        this.drones.forEach((drone, index) => {
            const delay = (index + 1) * 15;
            if (this.history[delay]) {
                drone.x = this.history[delay].x;
                drone.y = this.history[delay].y;
            }
        });
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // 半寫實科幻幾何戰機
        ctx.beginPath();
        ctx.moveTo(0, -this.size/2);
        ctx.lineTo(this.size/2, this.size/2);
        ctx.lineTo(0, this.size/3);
        ctx.lineTo(-this.size/2, this.size/2);
        ctx.closePath();
        ctx.fillStyle = '#4b5563';
        ctx.fill();

        // 核心發光點
        ctx.beginPath();
        ctx.arc(0, 0, 15, 0, Math.PI * 2);
        ctx.fillStyle = '#06b6d4';
        ctx.fill();
        ctx.restore();

        // 畫僚機
        this.drones.forEach(d => d.draw());
    }

    fireAir() {
        game.bullets.push(new AirBullet(this.x, this.y - 60));
        this.drones.forEach(d => game.bullets.push(new AirBullet(d.x, d.y - 20)));
        triggerVibration();
    }

    fireGround() {
        game.bombs.push(new GroundBomb(this.x, this.y - 60));
        triggerVibration();
    }

    addDrone() {
        if (this.drones.length < 2) {
            this.drones.push(new DroneOption());
        }
    }
}

// 2. 僚機
class DroneOption {
    constructor() {
        this.x = 540;
        this.y = 1600;
        this.size = 40;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(34, 211, 238, 0.7)';
        ctx.fill();
    }
}

// 3. 對空子彈
class AirBullet {
    constructor(x, y) { this.x = x; this.y = y; this.width = 12; this.height = 40; }
    update() { this.y -= 1200 * (1/60); }
    draw() {
        ctx.fillStyle = '#eab308';
        ctx.fillRect(this.x - this.width/2, this.y - this.height/2, this.width, this.height);
    }
}

// 4. 對地炸彈
class GroundBomb {
    constructor(x, y) { this.x = x; this.y = y; this.r = 18; }
    update() { this.y -= 500 * (1/60); }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ea580c';
        ctx.fill();
    }
}

// 5. 不規則突襲敵機
class AssaultEnemy {
    constructor(x, side) {
        this.x = x;
        this.y = -100;
        this.size = 70;
        this.side = side;
        this.time = Math.random() * 10;
    }
    update() {
        this.time += 1/60;
        this.y += 250 * (1/60);
        this.x += this.side * 220 * (1/60) + Math.sin(this.time * 5) * 8; // S型扭動
    }
    draw() {
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
        ctx.fillStyle = '#f97316';
        ctx.fillRect(this.x - 15, this.y - 15, 30, 30);
    }
}

// 6. 浮游晶體
const CrystalTypes = ['score', 'speed', 'power', 'option'];
const CrystalColors = ['#2563eb', '#16a34a', '#7c3aed', '#dc2626']; // 藍、綠、紫、紅

class FloatingCrystal {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.r = 30;
        this.typeIndex = 0; // 初始為加分 (藍)
    }
    changeType() {
        this.typeIndex = (this.typeIndex + 1) % CrystalTypes.length;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = CrystalColors[this.typeIndex];
        ctx.fill();

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r + 8, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

// 初始化玩家
const player = new PlayerFighter();

// ==========================================
// 操作事件監聽 (Touch & Mouse)
// ==========================================
let isPointerDown = false;

function handlePointerMove(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const gameX = (clientX - rect.left) * (game.width / rect.width);
    const gameY = (clientY - rect.top) * (game.height / rect.height);

    // 左半邊控制移動
    if (gameX < game.width / 2) {
        player.x = Math.max(60, Math.min(game.width - 60, gameX));
        player.y = Math.max(60, Math.min(game.height - 60, gameY));
    }
}

function handlePointerDown(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const gameX = (clientX - rect.left) * (game.width / rect.width);
    const gameY = (clientY - rect.top) * (game.height / rect.height);

    if (gameX < game.width / 2) {
        isPointerDown = true;
        handlePointerMove(clientX, clientY);
    } else {
        // 右半邊控制攻擊
        if (gameY < game.height / 2) {
            player.fireAir(); // 右上：對空
        } else {
            player.fireGround(); // 右下：對地
        }
    }
}

// 滑鼠事件
window.addEventListener('mousedown', e => handlePointerDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => { if (isPointerDown) handlePointerMove(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => isPointerDown = false);

// 觸控事件
window.addEventListener('touchstart', e => {
    const t = e.touches[0];
    handlePointerDown(t.clientX, t.clientY);
}, { passive: false });
window.addEventListener('touchmove', e => {
    const t = e.touches[0];
    handlePointerMove(t.clientX, t.clientY);
}, { passive: false });
window.addEventListener('touchend', () => isPointerDown = false);


// 瀏覽器安全震動模擬
function triggerVibration() {
    if (navigator.vibrate) navigator.vibrate(20);
}

// ==========================================
// 碰撞偵測核心邏輯 (Collisions)
// ==========================================
function checkCollisions() {
    // 1. 對地炸彈 撞 隱藏建築
    game.bombs.forEach((bomb, bIdx) => {
        game.buildings.forEach(b => {
            if (!b.isDestroyed && Math.hypot(bomb.x - b.x, bomb.y - b.y) < bomb.r + b.size/2) {
                b.isDestroyed = true;
                game.crystals.push(new FloatingCrystal(b.x, b.y)); // 彈出晶體
                game.bombs.splice(bIdx, 1);
            }
        });
    });

    // 2. 對地炸彈 撞 浮游晶體 (觸發變色)
    game.bombs.forEach((bomb, bIdx) => {
        game.crystals.forEach(c => {
            if (Math.hypot(bomb.x - c.x, bomb.y - c.y) < bomb.r + c.r) {
                c.changeType();
                game.bombs.splice(bIdx, 1);
            }
        });
    });

    // 3. 玩家 撞 浮游晶體 (獲得獎勵)
    game.crystals.forEach((c, cIdx) => {
        if (Math.hypot(player.x - c.x, player.y - c.y) < player.size/2 + c.r) {
            if (CrystalTypes[c.typeIndex] === 'option') {
                player.addDrone(); // 吃到紅色晶體增加僚機
            }
            game.crystals.splice(cIdx, 1);
        }
    });
}

// ==========================================
// 遊戲主迴圈 (Main Game Loop)
// ==========================================
function gameLoop() {
    // 清空畫面
    ctx.clearRect(0, 0, game.width, game.height);

    // 更新與繪製地表遺跡
    game.buildings.forEach(b => {
        if (!b.isDestroyed) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.fillRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size);
            ctx.strokeStyle = 'rgba(0, 191, 255, 0.3)';
            ctx.lineWidth = 4;
            ctx.strokeRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size);
        }
    });

    // 更新玩家與僚機
    player.update();
    player.draw();

    // 更新武器
    game.bullets.forEach((b, idx) => { b.update(); b.draw(); if(b.y < 0) game.bullets.splice(idx,1); });
    game.bombs.forEach((b, idx) => { b.update(); b.draw(); if(b.y < 0) game.bombs.splice(idx,1); });

    // 生產突襲敵機小隊 (每 4 秒)
    game.spawnTimer += 1/60;
    if (game.spawnTimer > 4.0) {
        game.spawnTimer = 0;
        const side = Math.random() > 0.5 ? 1 : -1;
        const startX = side === 1 ? 100 : 980;
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                game.enemies.push(new AssaultEnemy(startX, side));
            }, i * 300); // 縱隊進場間隔
        }
    }

    // 更新敵機
    game.enemies.forEach((e, idx) => { 
        e.update(); 
        e.draw(); 
        if(e.y > game.height) game.enemies.splice(idx, 1); 
    });

    // 更新晶體
    game.crystals.forEach(c => c.draw());

    // 碰撞偵測
    checkCollisions();

    // UI 文字顯示 (分數等)
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 40px Courier New';
    ctx.fillText(`WEAPON LV: ${player.drones.length + 1}`, 50, 100);

    requestAnimationFrame(gameLoop);
}

// 啟動遊戲
gameLoop();
</script>

</body>
</html>
