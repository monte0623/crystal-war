<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal War - 鐵板陣 x 兵蜂 (手感優化版)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #09090b;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100vmin;
            height: 177.77vmin;
            max-width: 540px;
            max-height: 960px;
            border: 2px solid #3f3f46;
            background-color: #111115;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #a1a1aa;
            pointer-events: none;
            text-align: center;
            width: 90%;
            background: rgba(0,0,0,0.6);
            padding: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="1080" height="1920"></canvas>
    <div id="hint">【左半邊】任意處按住並上下左右滑動=控制移動 (不擋機身) <br> 【右半邊】點擊上半部=對空砲 | 下半部=對地炸彈</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ==========================================
// 遊戲全域變數與狀態
// ==========================================
const game = {
    width: 1080,
    height: 1920,
    spawnTimer: 0,
    bullets: [],
    bombs: [],
    enemies: [],
    crystals: [],
    explosions: [], // 增加爆炸特效陣列
    buildings: [
        { x: 300, y: 600, size: 140, isDestroyed: false },
        { x: 780, y: 400, size: 140, isDestroyed: false }
    ],
    score: 0,
    kills: 0
};

// ==========================================
// 物件類別定義 (Entities)
// ==========================================

// 1. 玩家戰機 (改成相對位移控制)
class PlayerFighter {
    constructor() {
        this.x = 540;
        this.y = 1600;
        this.size = 100;
        this.drones = [];
        this.history = [];
        this.speedMultiplier = 2.2; // 控制滑動靈敏度
    }

    // 接收滑動的相對變量 (Delta)
    move(dx, dy) {
        this.x += dx * this.speedMultiplier;
        this.y += dy * this.speedMultiplier;

        // 邊界限制
        this.x = Math.max(60, Math.min(game.width - 60, this.x));
        this.y = Math.max(60, Math.min(game.height - 60, this.y));
    }

    update() {
        this.history.unshift({ x: this.x, y: this.y });
        if (this.history.length > 100) this.history.pop();

        this.drones.forEach((drone, index) => {
            const delay = (index + 1) * 15;
            if (this.history[delay]) {
                drone.x = this.history[delay].x;
                drone.y = this.history[delay].y;
            }
        });
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // 戰機外型
        ctx.beginPath();
        ctx.moveTo(0, -this.size/2);
        ctx.lineTo(this.size/2, this.size/2);
        ctx.lineTo(0, this.size/3);
        ctx.lineTo(-this.size/2, this.size/2);
        ctx.closePath();
        ctx.fillStyle = '#64748b';
        ctx.fill();

        // 引擎噴火視覺效果
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#38bdf8';
        ctx.beginPath();
        ctx.arc(0, this.size/2, 12, 0, Math.PI * 2);
        ctx.fillStyle = '#38bdf8';
        ctx.fill();
        ctx.restore();

        this.drones.forEach(d => d.draw());
    }

    fireAir() {
        // 對空子彈改為較寬的判定
        game.bullets.push(new AirBullet(this.x, this.y - 60));
        this.drones.forEach(d => game.bullets.push(new AirBullet(d.x, d.y - 20)));
        triggerVibration();
    }

    fireGround() {
        game.bombs.push(new GroundBomb(this.x, this.y - 60));
        triggerVibration();
    }

    addDrone() {
        if (this.drones.length < 2) {
            this.drones.push(new DroneOption());
        }
    }
}

// 2. 僚機
class DroneOption {
    constructor() { this.x = 540; this.y = 1600; this.size = 40; }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(34, 211, 238, 0.8)';
        ctx.fill();
    }
}

// 3. 對空子彈 (加大判定體積)
class AirBullet {
    constructor(x, y) { this.x = x; this.y = y; this.width = 24; this.height = 50; } // 加寬加長
    update() { this.y -= 1500 * (1/60); }
    draw() {
        ctx.fillStyle = '#fde047';
        ctx.fillRect(this.x - this.width/2, this.y - this.height/2, this.width, this.height);
    }
}

// 4. 對地炸彈
class GroundBomb {
    constructor(x, y) { this.x = x; this.y = y; this.r = 25; } // 加大爆炸範圍
    update() { this.y -= 600 * (1/60); }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = '#f97316';
        ctx.fill();
    }
}

// 5. 不規則突襲敵機
class AssaultEnemy {
    constructor(x, side) {
        this.x = x;
        this.y = -100;
        this.size = 80;
        this.side = side;
        this.time = Math.random() * 10;
        this.hp = 1; // 敵機血量
    }
    update() {
        this.time += 1/60;
        this.y += 280 * (1/60);
        this.x += this.side * 200 * (1/60) + Math.sin(this.time * 4) * 10;
    }
    draw() {
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
        ctx.fillStyle = '#f97316';
        ctx.fillRect(this.x - 20, this.y - 20, 40, 40);
    }
}

// 6. 浮游晶體
const CrystalTypes = ['score', 'speed', 'power', 'option'];
const CrystalColors = ['#3b82f6', '#22c55e', '#a855f7', '#ef4444'];

class FloatingCrystal {
    constructor(x, y) { this.x = x; this.y = y; this.r = 35; this.typeIndex = 0; }
    changeType() { this.typeIndex = (this.typeIndex + 1) % CrystalTypes.length; }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = CrystalColors[this.typeIndex];
        ctx.fill();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r + 10, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 3;
        ctx.stroke();
    }
}

// 7. 爆炸特效視覺組件
class VisualExplosion {
    constructor(x, y, color) { this.x = x; this.y = y; this.r = 10; this.maxR = 60; this.life = 1.0; this.color = color; }
    update() { this.r += 3; this.life -= 0.05; }
    draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }
}

const player = new PlayerFighter();

// ==========================================
// 優化後的操控事件監聽 (相對滑動演算法)
// ==========================================
let isPointerDown = false;
let lastPointerX = 0;
let lastPointerY = 0;

function handlePointerDown(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const gameX = (clientX - rect.left) * (game.width / rect.width);
    const gameY = (clientY - rect.top) * (game.height / rect.height);

    if (gameX < game.width / 2) {
        // 左半邊：啟動相對滑動
        isPointerDown = true;
        lastPointerX = clientX;
        lastPointerY = clientY;
    } else {
        // 右半邊：武器發射
        if (gameY < game.height / 2) {
            player.fireAir();
        } else {
            player.fireGround();
        }
    }
}

function handlePointerMove(clientX, clientY) {
    if (!isPointerDown) return;
    
    const rect = canvas.getBoundingClientRect();
    // 計算滑鼠/手指移動了多少「比例距離」
    const deltaX = (clientX - lastPointerX) * (game.width / rect.width);
    const deltaY = (clientY - lastPointerY) * (game.height / rect.height);

    // 戰機依照手震/移動的幅度做相對移動，不再瞬移
    player.move(deltaX, deltaY);

    lastPointerX = clientX;
    lastPointerY = clientY;
}

// 綁定事件
window.addEventListener('mousedown', e => handlePointerDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => handlePointerMove(e.clientX, e.clientY));
window.addEventListener('mouseup', () => isPointerDown = false);

window.addEventListener('touchstart', e => {
    const t = e.touches[0];
    handlePointerDown(t.clientX, t.clientY);
}, { passive: false });
window.addEventListener('touchmove', e => {
    const t = e.touches[0];
    handlePointerMove(t.clientX, t.clientY);
}, { passive: false });
window.addEventListener('touchend', () => isPointerDown = false);

function triggerVibration() { if (navigator.vibrate) navigator.vibrate(25); }

// ==========================================
// 戰鬥判定與碰撞核心 (解決無法有效擊破問題)
// ==========================================
function checkCollisions() {
    // 1. 對空子彈 擊中 突襲敵機 (確實擊破邏輯)
    game.bullets.forEach((bullet, bIdx) => {
        game.enemies.forEach((enemy, eIdx) => {
            if (Math.abs(bullet.x - enemy.x) < (bullet.width/2 + enemy.size/2) &&
                Math.abs(bullet.y - enemy.y) < (bullet.height/2 + enemy.size/2)) {
                
                // 移除子彈
                game.bullets.splice(bIdx, 1);
                enemy.hp--;

                if (enemy.hp <= 0) {
                    // 觸發爆炸特效
                    game.explosions.push(new VisualExplosion(enemy.x, enemy.y, '#ef4444'));
                    game.enemies.splice(eIdx, 1);
                    game.score += 100;
                    game.kills += 1;
                }
            }
        });
    });

    // 2. 對地炸彈 轟炸 隱藏建築
    game.bombs.forEach((bomb, bIdx) => {
        game.buildings.forEach(b => {
            if (!b.isDestroyed && Math.hypot(bomb.x - b.x, bomb.y - b.y) < bomb.r + b.size/2) {
                b.isDestroyed = true;
                game.explosions.push(new VisualExplosion(b.x, b.y, '#eab308'));
                game.crystals.push(new FloatingCrystal(b.x, b.y));
                game.bombs.splice(bIdx, 1);
                game.score += 500;
            }
        });
    });

    // 3. 對地炸彈 改變 晶體顏色
    game.bombs.forEach((bomb, bIdx) => {
        game.crystals.forEach(c => {
            if (Math.hypot(bomb.x - c.x, bomb.y - c.y) < bomb.r + c.r) {
                c.changeType();
                game.bombs.splice(bIdx, 1);
            }
        });
    });

    // 4. 戰機 吃到 晶體
    game.crystals.forEach((c, cIdx) => {
        if (Math.hypot(player.x - c.x, player.y - c.y) < player.size/2 + c.r) {
            if (CrystalTypes[c.typeIndex] === 'option') {
                player.addDrone();
            }
            game.score += 1000;
            game.crystals.splice(cIdx, 1);
        }
    });
}

// ==========================================
// 遊戲主迴圈
// ==========================================
function gameLoop() {
    ctx.clearRect(0, 0, game.width, game.height);

    // 畫地表隱藏遺跡
    game.buildings.forEach(b => {
        if (!b.isDestroyed) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.fillRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size);
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.2)';
            ctx.lineWidth = 4;
            ctx.strokeRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size);
        }
    });

    // 更新機體
    player.update();
    player.draw();

    // 更新子彈與炸彈
    game.bullets.forEach((b, idx) => { b.update(); b.draw(); if(b.y < -50) game.bullets.splice(idx,1); });
    game.bombs.forEach((b, idx) => { b.update(); b.draw(); if(b.y < -50) game.bombs.splice(idx,1); });

    // 生產突襲敵機 (優化間隔)
    game.spawnTimer += 1/60;
    if (game.spawnTimer > 3.5) {
        game.spawnTimer = 0;
        const side = Math.random() > 0.5 ? 1 : -1;
        const startX = side === 1 ? -50 : 1130;
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                game.enemies.push(new AssaultEnemy(startX, side));
            }, i * 350);
        }
    }

    // 更新敵機
    game.enemies.forEach((e, idx) => { 
        e.update(); 
        e.draw(); 
        if(e.y > game.height + 100) game.enemies.splice(idx, 1); 
    });

    // 更新晶體
    game.crystals.forEach(c => c.draw());

    // 更新與畫出爆炸特效
    game.explosions.forEach((exp, idx) => {
        exp.update();
        exp.draw();
        if (exp.life <= 0) game.explosions.splice(idx, 1);
    });

    // 碰撞檢查
    checkCollisions();

    // 科幻儀表資訊數據
    ctx.fillStyle = '#f8fafc';
    ctx.font = 'bold 45px "Courier New"';
    ctx.fillText(`SCORE: ${game.score.toString().padStart(6, '0')}`, 60, 100);
    ctx.fillText(`KILLS: ${game.kills}`, 60, 170);
    ctx.fillText(`DRONES: ${player.drones.length}/2`, 60, 240);

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
