<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crystal War - 體感控制版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #09090b;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100vmin;
            height: 177.77vmin;
            max-width: 540px;
            max-height: 960px;
            border: 2px solid #3f3f46;
            background-color: #111115;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #hint-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(9, 9, 11, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 30px;
            text-align: center;
        }
        .btn {
            background: #06b6d4;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
        }
        #hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #a1a1aa;
            pointer-events: none;
            text-align: center;
            width: 90%;
            background: rgba(0,0,0,0.6);
            padding: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hint-overlay">
        <h2>🚀 體感戰機準備就緒</h2>
        <p style="margin-top:10px; color:#a1a1aa;">本遊戲使用手機陀螺儀操作。<br>請平拿手機，並點擊下方按鈕開始駕駛！</p>
        <button class="btn" onclick="initTiltControls()">啟動體感駕駛</button>
    </div>

    <canvas id="gameCanvas" width="1080" height="1920"></canvas>
    <div id="hint">【手機傾斜】前後左右晃動=控制戰機移動 <br> 【右半邊螢幕】點擊上半部=對空砲 | 下半部=對地炸彈</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ==========================================
// 遊戲全域變數與狀態
// ==========================================
const game = {
    width: 1080,
    height: 1920,
    spawnTimer: 0,
    bullets: [],
    bombs: [],
    enemies: [],
    crystals: [],
    explosions: [],
    buildings: [
        { x: 300, y: 600, size: 140, isDestroyed: false },
        { x: 780, y: 400, size: 140, isDestroyed: false }
    ],
    score: 0,
    kills: 0,
    tiltX: 0, // 手機左右傾斜量
    tiltY: 0  // 手機前後傾斜量
};

// ==========================================
// 體感控制初始化 (iOS 13+ 與 Android 安全規範)
// ==========================================
function initTiltControls() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS 裝置需要權限彈窗
        DeviceOrientationEvent.requestPermission()
            .then(permissionState => {
                if (permissionState === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                    document.getElementById('hint-overlay').style.display = 'none';
                } else {
                    alert('需要體感權限才能用傾斜操作戰機喔！');
                }
            })
            .catch(console.error);
    } else {
        // Android 或一般常規網頁直接監聽
        window.addEventListener('deviceorientation', handleOrientation);
        document.getElementById('hint-overlay').style.display = 'none';
    }
}

function handleOrientation(event) {
    // gamma: 左右傾斜 (-90 到 90) -> 映射到我們的 tiltX
    // beta: 前後傾斜 (-180 到 180) -> 映射到我們的 tiltY
    // 我們設定一個舒適的平拿基準角：beta 稍微傾斜 45 度為坐姿視角
    const baseBeta = 45; 
    
    game.tiltX = event.gamma ? event.gamma : 0;
    game.tiltY = event.beta ? (event.beta - baseBeta) : 0;
}

// ==========================================
// 物件類別定義 (Entities)
// ==========================================
class PlayerFighter {
    constructor() {
        this.x = 540;
        this.y = 1600;
        this.size = 100;
        this.drones = [];
        this.history = [];
        this.tiltSensitivity = 1.2; // 體感靈敏度
    }

    update() {
        // 根據手機傾斜角度更新位置 (加入了斜率緩衝，避免過度靈敏晃動)
        if (Math.abs(game.tiltX) > 2) { // 設有 2 度的死區避免微幅手震
            this.x += game.tiltX * this.tiltSensitivity;
        }
        if (Math.abs(game.tiltY) > 2) {
            this.y += game.tiltY * this.tiltSensitivity;
        }

        // 邊界邊緣鎖定
        this.x = Math.max(60, Math.min(game.width - 60, this.x));
        this.y = Math.max(60, Math.min(game.height - 60, this.y));

        // 僚機歷史紀錄
        this.history.unshift({ x: this.x, y: this.y });
        if (this.history.length > 100) this.history.pop();

        this.drones.forEach((drone, index) => {
            const delay = (index + 1) * 15;
            if (this.history[delay]) {
                drone.x = this.history[delay].x;
                drone.y = this.history[delay].y;
            }
        });
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // 戰機外型
        ctx.beginPath();
        ctx.moveTo(0, -this.size/2);
        ctx.lineTo(this.size/2, this.size/2);
        ctx.lineTo(0, this.size/3);
        ctx.lineTo(-this.size/2, this.size/2);
        ctx.closePath();
        ctx.fillStyle = '#64748b';
        ctx.fill();

        // 噴火特效
        ctx.beginPath();
        ctx.arc(0, this.size/2, 12, 0, Math.PI * 2);
        ctx.fillStyle = '#38bdf8';
        ctx.fill();
        ctx.restore();

        this.drones.forEach(d => d.draw());
    }

    fireAir() {
        game.bullets.push(new AirBullet(this.x, this.y - 60));
        this.drones.forEach(d => game.bullets.push(new AirBullet(d.x, d.y - 20)));
        triggerVibration();
    }

    fireGround() {
        game.bombs.push(new GroundBomb(this.x, this.y - 60));
        triggerVibration();
    }

    addDrone() {
        if (this.drones.length < 2) this.drones.push(new DroneOption());
    }
}

// 2. 僚機
class DroneOption {
    constructor() { this.x = 540; this.y = 1600; this.size = 40; }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(34, 211, 238, 0.8)';
        ctx.fill();
    }
}

// 3. 對空子彈
class AirBullet {
    constructor(x, y) { this.x = x; this.y = y; this.width = 24; this.height = 50; }
    update() { this.y -= 1500 * (1/60); }
    draw() {
        ctx.fillStyle = '#fde047';
        ctx.fillRect(this.x - this.width/2, this.y - this.height/2, this.width, this.height);
    }
}

// 4. 對地炸彈
class GroundBomb {
    constructor(x, y) { this.x = x; this.y = y; this.r = 25; }
    update() { this.y -= 600 * (1/60); }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = '#f97316';
        ctx.fill();
    }
}

// 5. 不規則突襲敵機
class AssaultEnemy {
    constructor(x, side) {
        this.x = x;
        this.y = -100;
        this.size = 80;
        this.side = side;
        this.time = Math.random() * 10;
        this.hp = 1;
    }
    update() {
        this.time += 1/60;
        this.y += 280 * (1/60);
        this.x += this.side * 200 * (1/60) + Math.sin(this.time * 4) * 10;
    }
    draw() {
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    }
}

// 6. 浮游晶體
const CrystalTypes = ['score', 'speed', 'power', 'option'];
const CrystalColors = ['#3b82f6', '#22c55e', '#a855f7', '#ef4444'];
class FloatingCrystal {
    constructor(x, y) { this.x = x; this.y = y; this.r = 35; this.typeIndex = 0; }
    changeType() { this.typeIndex = (this.typeIndex + 1) % CrystalTypes.length; }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = CrystalColors[this.typeIndex];
        ctx.fill();
    }
}

// 7. 爆炸特效
class VisualExplosion {
    constructor(x, y, color) { this.x = x; this.y = y; this.r = 10; this.life = 1.0; this.color = color; }
    update() { this.r += 3; this.life -= 0.05; }
    draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }
}

const player = new PlayerFighter();

// ==========================================
// 右半邊螢幕點擊判定 (只留發射功能)
// ==========================================
function handlePointerDown(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const gameX = (clientX - rect.left) * (game.width / rect.width);
    const gameY = (clientY - rect.top) * (game.height / rect.height);

    // 只有點擊右半邊才會觸發武器
    if (gameX > game.width / 2) {
        if (gameY < game.height / 2) {
            player.fireAir();
        } else {
            player.fireGround();
        }
    }
}

window.addEventListener('mousedown', e => handlePointerDown(e.clientX, e.clientY));
window.addEventListener('touchstart', e => {
    const t = e.touches[0];
    handlePointerDown(t.clientX, t.clientY);
}, { passive: false });

function triggerVibration() { if (navigator.vibrate) navigator.vibrate(25); }

// ==========================================
// 碰撞核心
// ==========================================
function checkCollisions() {
    game.bullets.forEach((bullet, bIdx) => {
        game.enemies.forEach((enemy, eIdx) => {
            if (Math.abs(bullet.x - enemy.x) < (bullet.width/2 + enemy.size/2) &&
                Math.abs(bullet.y - enemy.y) < (bullet.height/2 + enemy.size/2)) {
                game.bullets.splice(bIdx, 1);
                game.explosions.push(new VisualExplosion(enemy.x, enemy.y, '#ef4444'));
                game.enemies.splice(eIdx, 1);
                game.score += 100;
                game.kills += 1;
            }
        });
    });

    game.bombs.forEach((bomb, bIdx) => {
        game.buildings.forEach(b => {
            if (!b.isDestroyed && Math.hypot(bomb.x - b.x, bomb.y - b.y) < bomb.r + b.size/2) {
                b.isDestroyed = true;
                game.explosions.push(new VisualExplosion(b.x, b.y, '#eab308'));
                game.crystals.push(new FloatingCrystal(b.x, b.y));
                game.bombs.splice(bIdx, 1);
                game.score += 500;
            }
        });
    });

    game.bombs.forEach((bomb, bIdx) => {
        game.crystals.forEach(c => {
            if (Math.hypot(bomb.x - c.x, bomb.y - c.y) < bomb.r + c.r) {
                c.changeType();
                game.bombs.splice(bIdx, 1);
            }
        });
    });

    game.crystals.forEach((c, cIdx) => {
        if (Math.hypot(player.x - c.x, player.y - c.y) < player.size/2 + c.r) {
            if (CrystalTypes[c.typeIndex] === 'option') player.addDrone();
            game.score += 1000;
            game.crystals.splice(cIdx, 1);
        }
    });
}

// ==========================================
// 遊戲主迴圈
// ==========================================
function gameLoop() {
    ctx.clearRect(0, 0, game.width, game.height);

    game.buildings.forEach(b => {
        if (!b.isDestroyed) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.fillRect(b.x - b.size/2, b.y - b.size/2, b.size, b.size);
        }
    });

    player.update();
    player.draw();

    game.bullets.forEach((b, idx) => { b.update(); b.draw(); if(b.y < -50) game.bullets.splice(idx,1); });
    game.bombs.forEach((b, idx) => { b.update(); b.draw(); if(b.y < -50) game.bombs.splice(idx,1); });

    game.spawnTimer += 1/60;
    if (game.spawnTimer > 3.5) {
        game.spawnTimer = 0;
        const side = Math.random() > 0.5 ? 1 : -1;
        const startX = side === 1 ? -50 : 1130;
        for (let i = 0; i < 3; i++) {
            setTimeout(() => { game.enemies.push(new AssaultEnemy(startX, side)); }, i * 350);
        }
    }

    game.enemies.forEach((e, idx) => { e.update(); e.draw(); if(e.y > game.height + 100) game.enemies.splice(idx, 1); });
    game.crystals.forEach(c => c.draw());
    game.explosions.forEach((exp, idx) => { exp.update(); exp.draw(); if (exp.life <= 0) game.explosions.splice(idx, 1); });

    checkCollisions();

    // 儀表板
    ctx.fillStyle = '#f8fafc';
    ctx.font = 'bold 45px "Courier New"';
    ctx.fillText(`SCORE: ${game.score.toString().padStart(6, '0')}`, 60, 100);
    ctx.fillText(`KILLS: ${game.kills}`, 60, 170);

    requestAnimationFrame(gameLoop);
}

// 備註：initTiltControls 點擊後才會啟動 gameLoop
function startRealGame() {
    gameLoop();
}
// 修改引導按鈕點擊事件，除了要權限，還要啟動遊戲迴圈
const originalInit = initTiltControls;
initTiltControls = function() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(state => {
            if (state === 'granted') {
                window.addEventListener('deviceorientation', handleOrientation);
                document.getElementById('hint-overlay').style.display = 'none';
                gameLoop(); // 啟動
            }
        });
    } else {
        window.addEventListener('deviceorientation', handleOrientation);
        document.getElementById('hint-overlay').style.display = 'none';
        gameLoop(); // 啟動
    }
}
</script>

</body>
</html>
